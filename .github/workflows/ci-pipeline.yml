
name: Test and Deploy Pipeline CI/CD

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/cicd-pipeline-lab.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/cicd-pipeline-lab.yml"



jobs:
  
  build-and-test:
    runs-on: ${{ matrix.os }}
    
    strategy: 
      matrix: 
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest  

